name: Release
on:
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a GitHub Release?"
        required: true
        type: boolean
        default: false
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4

      - name: Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 zip libx11-dev libxcursor-dev \
          libxrandr-dev libxi-dev libxinerama-dev libxkbcommon-dev libdrm-dev libgbm-dev patchelf

      - uses: dtolnay/rust-toolchain@stable
        with: { targets: "x86_64-unknown-linux-gnu, x86_64-pc-windows-gnu" }

      - uses: swatinem/rust-cache@v2

      - name: Build
        run: |
          cargo build --release
          cargo build --release --target x86_64-pc-windows-gnu

      - name: Package
        env: { APPIMAGE_EXTRACT_AND_RUN: 1, STRIP: strip }
        run: |
          VER=${GITHUB_REF_NAME:-manual}

          mkdir -p "ocean-win"
          cp target/x86_64-pc-windows-gnu/release/ocean.exe presets static "ocean-win/" -r 2>/dev/null || true
          zip -r "ocean-${VER}-windows.zip" ocean-win

          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage && chmod +x linuxdeploy-x86_64.AppImage
          echo -e "[Desktop Entry]\nType=Application\nName=Ocean\nExec=ocean\nIcon=ocean\nCategories=Utility;" > ocean.desktop

          ./linuxdeploy-x86_64.AppImage --executable target/release/ocean --appdir AppDir --desktop-file ocean.desktop --icon-file static/ocean.svg --output appimage
          cp presets static AppDir/usr/bin/ -r 2>/dev/null || true
          ./linuxdeploy-x86_64.AppImage --appdir AppDir --output appimage
          mv Ocean-x86_64.AppImage "ocean-${VER}.AppImage"

          mkdir -p "ocean-linux/lib"
          cp target/release/ocean presets static "ocean-linux/" -r 2>/dev/null || true
          cp AppDir/usr/lib/* "ocean-linux/lib/" 2>/dev/null || true
          patchelf --set-rpath '$ORIGIN/lib' "ocean-linux/ocean"
          zip -r "ocean-${VER}-linux.zip" ocean-linux

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: builds
          path: |
            *.zip
            *.AppImage

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.create_release == 'true'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            *.zip
            *.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
