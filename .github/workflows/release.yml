name: Build and Package

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a GitHub Release?"
        required: true
        type: boolean
        default: false
  push:
    tags:
      - "v*"

jobs:
  build-and-package:
    name: Build and Package
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-mingw-w64-x86-64 \
            zip \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu, x86_64-pc-windows-gnu

      - name: Build Binaries
        run: |
          echo "Building Linux..."
          cargo build --release
          echo "Building Windows..."
          cargo build --release --target x86_64-pc-windows-gnu

      - name: Package Windows
        run: |
          VER=${GITHUB_REF_NAME:-manual}
          WIN_PKG="ocean-${VER}-windows-x86_64"
          mkdir -p "$WIN_PKG"
          cp target/x86_64-pc-windows-gnu/release/ocean.exe "$WIN_PKG/"
          cp -r presets static "$WIN_PKG/" 2>/dev/null || true
          zip -r "${WIN_PKG}.zip" "$WIN_PKG"

      - name: Package Linux
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
          STRIP: strip
        run: |
          VER=${GITHUB_REF_NAME:-manual}

          wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage

          echo "[Desktop Entry]
          Type=Application
          Name=Ocean
          Exec=ocean
          Icon=ocean
          Categories=Utility;" > ocean.desktop

          ./linuxdeploy-x86_64.AppImage --executable target/release/ocean \
            --appdir AppDir \
            --desktop-file ocean.desktop \
            --icon-file static/ocean.svg \
            --output appimage

          cp -r presets static AppDir/usr/bin/

          ./linuxdeploy-x86_64.AppImage --appdir AppDir --output appimage
          mv Ocean-x86_64.AppImage "ocean-${VER}-x86_64.AppImage"

          LINUX_ZIP="ocean-${VER}-linux-portable"
          mkdir -p "$LINUX_ZIP/lib"
          cp target/release/ocean "$LINUX_ZIP/"
          cp -r presets static "$LINUX_ZIP/"
          cp AppDir/usr/lib/* "$LINUX_ZIP/lib/" 2>/dev/null || true

          echo '#!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          export LD_LIBRARY_PATH="$HERE/lib:$LD_LIBRARY_PATH"
          exec "$HERE/ocean" "$@"' > "$LINUX_ZIP/run.sh"
          chmod +x "$LINUX_ZIP/run.sh"

          zip -r "${LINUX_ZIP}.zip" "$LINUX_ZIP"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ocean-builds
          path: |
            *.zip
            *.AppImage

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.create_release == 'true'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            *.zip
            *.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
